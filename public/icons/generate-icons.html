<!-- Simple way to create PWA icons using Canvas -->
<!-- Open in browser, right-click save as -->
<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h1>PWA Icon Generator</h1>
<p>Icons will be generated below. Right-click and save.</p>
<canvas id="c" width="512" height="512"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Gradient background
const grad = ctx.createLinearGradient(0, 0, 512, 512);
grad.addColorStop(0, '#ff1a88');
grad.addColorStop(1, '#7c3aed');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 512, 512);

// Circle
ctx.fillStyle = 'rgba(255,255,255,0.1)';
ctx.beginPath();
ctx.arc(256, 256, 200, 0, Math.PI * 2);
ctx.fill();

// Robot emoji
ctx.font = 'bold 300px Arial';
ctx.fillStyle = '#ffffff';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🤖', 256, 280);

// Download link
const link = document.createElement('a');
link.href = canvas.toDataURL('image/png');
link.download = 'icon-512.png';
console.log('Right-click the canvas above and select "Save image as..." → icon-512.png');
</script>
</body>
</html>
